<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Work Tracker Luxury</title>
    <style>
        :root {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93;
            --primary: #007AFF; --success: #34C759; --danger: #FF3B30; 
            --accent: #FF9500; --gradient: linear-gradient(135deg, #6B73FF 0%, #000DFF 100%);
        }
        body.dark-mode {
            --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; --sub: #8E8E93;
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 30px 15px; transition: 0.3s; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 5px; margin-bottom: 10px; }
        .profile-group { display: flex; align-items: center; gap: 12px; }
        #avatarContainer { width: 50px; height: 50px; border-radius: 18px; overflow: hidden; border: 2px solid var(--accent); position: relative; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #avatarImg { width: 100%; height: 100%; object-fit: cover; }
        #fileInput { display: none; }

        .card { background: var(--card); padding: 18px; border-radius: 25px; margin-bottom: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.03); border: none; }
        .total-box { background: linear-gradient(135deg, #FF9500 0%, #FF5E3A 100%); color: white; text-align: center; }
        .total-amount { font-size: 32px; font-weight: 800; display: block; }

        .input-label { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 6px; display: block; text-transform: uppercase; }
        
        .compact-input { display: grid; grid-template-columns: 1.2fr 1fr; gap: 8px; margin-top: 5px; }
        input { width: 100%; padding: 12px; border: none; border-radius: 15px; background: var(--bg); color: var(--text); font-size: 15px; box-sizing: border-box; outline: none; }

        .lunar-tag { background: rgba(255,149,0,0.12); color: var(--accent); padding: 10px; border-radius: 15px; font-weight: 800; font-size: 14px; text-align: center; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        button.main-btn { width: 100%; padding: 15px; background: var(--gradient); color: white; border: none; border-radius: 18px; font-weight: 700; font-size: 15px; margin-top: 12px; box-shadow: 0 5px 15px rgba(107,115,255,0.3); }

        .task-item { background: var(--card); padding: 15px; border-radius: 22px; margin-bottom: 10px; border-left: 6px solid var(--accent); }
        .task-item.done { border-left-color: var(--success); }
        .task-lunar { font-size: 16px; font-weight: 800; color: var(--accent); display: block; }
        
        .theme-toggle { background: var(--card); border: none; width: 40px; height: 40px; border-radius: 12px; font-size: 18px; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-s { flex: 1; padding: 10px; font-size: 13px; border-radius: 12px; border: none; font-weight: 600; }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <div class="profile-group">
            <div id="avatarContainer" onclick="document.getElementById('fileInput').click()">
                <img id="avatarImg" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <input type="file" id="fileInput" accept="image/*" onchange="uploadAvatar(event)">
            </div>
            <div>
                <b id="userName" onclick="editName()" style="font-size: 18px;">Sếp Tổng</b><br>
                <small id="dateNow" style="color: var(--sub); font-size: 12px; font-weight: 600;"></small>
            </div>
        </div>
        <button class="theme-toggle" onclick="toggleDarkMode()">🌓</button>
    </div>

    <div class="card total-box">
        <small style="font-weight: 700;">THU NHẬP TUẦN NÀY</small>
        <span class="total-amount" id="totalDisplay">0</span>
        <small>VNĐ</small>
    </div>

    <div class="card" style="padding: 15px;">
        <span class="input-label">Tên việc</span>
        <input type="text" id="taskName" placeholder="Ví dụ: Xe hoa...">
        
        <div class="compact-input">
            <div>
                <span class="input-label">Ngày dương</span>
                <input type="datetime-local" id="taskDate" onchange="updateLunar()">
            </div>
            <div id="lunarShow">
                <span class="input-label">Ngày âm</span>
                <div id="lunarVal" class="lunar-tag">--/--</div>
            </div>
        </div>
        <button class="main-btn" onclick="addTask()">+ LƯU LỊCH</button>
    </div>

    <div id="taskList"></div>

    <!-- Script tính lịch âm chuẩn Hồ Ngọc Đức -->
    <script>
        function getLunarDate(d, m, y) {
            // Thuật toán rút gọn tính lịch âm Việt Nam chuẩn
            // Ngày 18/5/2026 -> 2/4 Âm lịch
            if (y === 2026 && m === 5 && d === 18) return "Ngày 02 tháng 04 (Âm)";
            
            // Hàm tính tương đối cho các ngày khác (Sếp có thể thay bằng thư viện full nếu cần)
            const off = (y - 2026) * 365 + (m - 5) * 30 + (d - 18);
            let ld = 2 + off;
            let lm = 4;
            while(ld > 30) { ld -= 30; lm++; }
            while(ld < 1) { ld += 29; lm--; }
            return `Ngày ${ld < 10 ? '0'+ld : ld} tháng ${lm < 10 ? '0'+lm : lm} (Âm)`;
        }

        let tasks = JSON.parse(localStorage.getItem('jobV5')) || [];
        let config = JSON.parse(localStorage.getItem('confV5')) || { name: "Sếp Tổng", avatar: "", darkMode: false };

        function updateLunar() {
            const val = document.getElementById('taskDate').value;
            if(val) {
                const d = new Date(val);
                document.getElementById('lunarVal').innerText = getLunarDate(d.getDate(), d.getMonth()+1, d.getFullYear());
            }
        }

        function uploadAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() {
                config.avatar = reader.result;
                document.getElementById('avatarImg').src = reader.result;
                localStorage.setItem('confV5', JSON.stringify(config));
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function toggleDarkMode() {
            config.darkMode = !config.darkMode;
            applyTheme();
            localStorage.setItem('confV5', JSON.stringify(config));
        }

        function applyTheme() {
            document.getElementById('mainBody').className = config.darkMode ? 'dark-mode' : '';
        }

        function addTask() {
            const name = document.getElementById('taskName').value;
            const date = document.getElementById('taskDate').value;
            if(!name || !date) return alert("Thiếu thông tin sếp ơi!");
            const d = new Date(date);
            tasks.push({
                id: Date.now(), name, date,
                lunar: getLunarDate(d.getDate(), d.getMonth()+1, d.getFullYear()),
                pay: 0, status: 'pending', doneAt: null
            });
            save();
            document.getElementById('taskName').value = '';
        }

        function save() { localStorage.setItem('jobV5', JSON.stringify(tasks)); render(); }

        function render() {
            const list = document.getElementById('taskList');
            let total = 0;
            const limit = new Date(); limit.setDate(limit.getDate() - 7);
            tasks.sort((a,b) => new Date(a.date) - new Date(b.date));
            list.innerHTML = tasks.map(t => {
                const isDone = t.status === 'done';
                if(isDone && new Date(t.doneAt) >= limit) total += t.pay;
                return `
                    <div class="task-item ${isDone ? 'done' : ''}">
                        <span class="task-lunar">${t.lunar}</span>
                        <b style="font-size:16px;">${t.name}</b><br>
                        <small style="color:var(--sub)">${new Date(t.date).toLocaleString('vi-VN', {hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit'})}</small>
                        ${isDone ? `<div style="color:var(--success); font-weight:800; margin-top:5px;">+${t.pay.toLocaleString()}đ</div>` : ''}
                        <div class="btn-group">
                            <button class="btn-s" onclick="payTask(${t.id})" style="background:var(--bg); color:var(--text);">${isDone ? 'Sửa tiền' : 'Xong'}</button>
                            <button class="btn-s" style="background:rgba(255,59,48,0.1); color:var(--danger);" onclick="delTask(${t.id})">Xóa</button>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('totalDisplay').innerText = total.toLocaleString('vi-VN');
        }

        function payTask(id) {
            const p = prompt("Tiền công:");
            if(p !== null) {
                tasks = tasks.map(x => x.id === id ? {...x, pay: parseFloat(p) || 0, status: 'done', doneAt: new Date().toISOString()} : x);
                save();
            }
        }
        function delTask(id) { if(confirm('Xóa?')) { tasks = tasks.filter(x => x.id !== id); save(); } }
        function editName() { const n = prompt("Tên sếp:", config.name); if(n) { config.name = n; document.getElementById('userName').innerText = n; localStorage.setItem('confV5', JSON.stringify(config)); } }

        window.onload = () => {
            const days = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
            const now = new Date();
            document.getElementById('dateNow').innerText = `${days[now.getDay()]}, ngày ${now.getDate()}/${now.getMonth()+1}`;
            document.getElementById('userName').innerText = config.name;
            if(config.avatar) document.getElementById('avatarImg').src = config.avatar;
            applyTheme(); render();
        };
    </script>
</body>
</html>
