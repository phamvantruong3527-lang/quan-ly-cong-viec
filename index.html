<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Đức Tú Event">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/bvLYr4mW/671682828-122098459472734577-1752480557510973163-n.jpg">
    <link rel="apple-touch-icon-precomposed" href="https://i.postimg.cc/bvLYr4mW/671682828-122098459472734577-1752480557510973163-n.jpg">
    <title>Đức Tú Event - Quản Lý Lịch</title>
    <style>
        :root { --gold: #D4AF37; --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93; }
        body.dark { --bg: #0A0A0A; --card: #1C1C1E; --text: #FFFFFF; --sub: #888; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 30px 15px; transition: 0.3s; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(142,142,147,0.2); }
        .avatar-box { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; cursor: pointer; position: relative; flex-shrink: 0; background: #eee; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        #avatarInput { display: none; }
        .editable-name { color: var(--gold); font-size: 16px; font-weight: bold; border: none; background: transparent; outline: none; min-width: 80px; font-family: -apple-system, sans-serif; }

        .summary-card { background: var(--card); padding: 15px; border-radius: 20px; margin: 15px 0; border: 1px solid var(--gold); display: flex; justify-content: space-around; text-align: center; }
        .summary-item b { color: var(--gold); font-size: 16px; display: block; }
        .summary-item span { font-size: 9px; color: var(--sub); text-transform: uppercase; }

        .filter-section { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .month-select { background: var(--card); color: var(--gold); border: 1px solid var(--gold); padding: 5px 12px; border-radius: 10px; font-weight: bold; outline: none; }

        .main-card { background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }

        /* Style cho ô chọn ngày có ghi chú bên trong */
        .input-group { position: relative; margin-bottom: 12px; }
        input[type="text"], input[type="date"] {
            width: 100%; padding: 12px; border-radius: 14px; border: 1.5px solid rgba(142,142,147,0.3); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 14px; text-align: center; outline: none;
        }
        input[type="date"] { position: relative; }
        input[type="date"]::before {
            content: "NGÀY LÀM SHOW: ";
            color: var(--gold); font-weight: bold; font-size: 11px; margin-right: 5px;
        }

        .lunar-preview { display: none; background: rgba(212,175,55,0.12); border: 1px solid rgba(212,175,55,0.4); border-radius: 12px; padding: 9px; margin-bottom: 12px; font-size: 13px; color: var(--gold); font-weight: bold; }
        .lunar-preview.show { display: block; }
        .btn-save { background: linear-gradient(135deg, #D4AF37, #B8860B); color: white; border: none; padding: 15px; width: 100%; border-radius: 16px; font-weight: bold; font-size: 15px; cursor: pointer; }

        .show-item { background: var(--card); padding: 10px 14px; border-radius: 14px; margin-top: 10px; border-left: 4px solid #444; font-size: 13px; }
        .show-item.paid { border-left-color: #34C759; }
        .show-item.waiting { border-left-color: #FF3B30; }
        .show-top { display: flex; justify-content: space-between; align-items: center; }
        .show-title { font-size: 15px; font-weight: bold; }
        .wait-tag { color: #FF3B30; font-size: 10px; font-weight: bold; }
        .show-info { color: var(--sub); margin-top: 4px; line-height: 1.6; }
        .money-display { color: #34C759; font-weight: bold; }

        .actions { margin-top: 8px; display: flex; gap: 6px; }
        .btn-act { flex: 1; border: none; padding: 6px 4px; border-radius: 7px; font-size: 10px; font-weight: bold; color: white; cursor: pointer; }
        .btn-done { background: #34C759; }
        .btn-wait { background: #FF3B30; }
        .btn-del { background: #8E8E93; flex: none; width: 36px; }

        /* Modal Sửa */
        .edit-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: flex-end; justify-content: center; }
        .edit-modal-overlay.show { display: flex; }
        .edit-sheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 20px 20px 40px; animation: slideUp .3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; color: var(--gold); text-align: center; }
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-cancel { flex: 1; background: var(--bg); color: var(--text); border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-update { flex: 1; background: linear-gradient(135deg, #D4AF37, #B8860B); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body id="mainBody">

    <canvas id="compressCanvas" style="display:none;"></canvas>
    <input type="file" id="avatarInput" accept="image/*">

    <div class="header">
        <div class="avatar-box">
            <div class="avatar" onclick="document.getElementById('avatarInput').click()">
                <img id="avatarImg" src="" alt="avatar">
            </div>
            <input class="editable-name" id="brandName" type="text" value="">
        </div>
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:22px;">🌓</button>
    </div>

    <div class="filter-section">
        <span style="font-size:13px; font-weight:bold;">THÁNG:</span>
        <input type="month" id="monthFilter" class="month-select" onchange="render()">
    </div>

    <div class="summary-card">
        <div class="summary-item"><b id="countMonth">0</b><span>Show Tháng</span></div>
        <div class="summary-item"><b id="moneyMonth">0đ</b><span>Thực Thu</span></div>
    </div>

    <div class="main-card">
        <input type="text" id="sTitle" placeholder="Tên khách hàng / Show diễn" style="margin-bottom:12px;">
        <input type="date" id="sTime">
        <div class="lunar-preview" id="lunarPreview">🌙 —</div>
        <button class="btn-save" onclick="saveShow()">LƯU LỊCH DIỄN</button>
    </div>

    <div id="showList"></div>

    <div class="edit-modal-overlay" id="editOverlay" onclick="if(event.target==this) closeEditDirect()">
        <div class="edit-sheet">
            <div class="sheet-title">✏️ Chỉnh Sửa Thông Tin</div>
            <input type="text" id="editTitle" placeholder="Tên khách / Show">
            <input type="date" id="editTime" style="margin-top:12px;">
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeEditDirect()">Hủy</button>
                <button class="btn-update" onclick="saveEdit()">Cập Nhật</button>
            </div>
        </div>
    </div>

    <script>
        let shows = JSON.parse(localStorage.getItem('duc_tu_v27')) || [];
        let editingId = null;

        // Xử lý Ảnh đại diện (Nén ảnh để không bị lỗi bộ nhớ)
        const avatarImg = document.getElementById('avatarImg');
        avatarImg.src = localStorage.getItem('brand_avatar') || 'https://i.postimg.cc/bvLYr4mW/671682828-122098459472734577-1752480557510973163-n.jpg';

        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('compressCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 150; canvas.height = 150; // Nén nhỏ lại
                    ctx.drawImage(img, 0, 0, 150, 150);
                    const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                    avatarImg.src = compressedData;
                    localStorage.setItem('brand_avatar', compressedData);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        const nameEl = document.getElementById('brandName');
        nameEl.value = localStorage.getItem('brand_name') || 'ĐỨC TÚ EVENT';
        nameEl.addEventListener('input', () => localStorage.setItem('brand_name', nameEl.value));

        const now = new Date();
        document.getElementById('monthFilter').value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

        function toggleTheme() { document.getElementById('mainBody').classList.toggle('dark'); }

        function getLunar(str) {
            const d = new Date(str);
            const start = new Date(2026, 1, 17);
            const diff = Math.floor((d - start) / 86400000) + 1;
            let ld = (diff % 30) + 1, lm = Math.floor(diff / 30) + 1;
            return `${ld<10?'0'+ld:ld}/${lm<10?'0'+lm:lm} (Âm)`;
        }

        document.getElementById('sTime').addEventListener('change', function()
