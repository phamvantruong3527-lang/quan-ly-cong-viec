<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Đức Tú Event - Lịch Làm Việc</title>
    <style>
        :root { --gold: #D4AF37; --bg: #F2F2F7; --card: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { color: var(--gold); margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn-save { background: linear-gradient(135deg, #D4AF37, #B8860B); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 17px; margin-top: 10px; }
        .item { background: white; padding: 15px; border-radius: 15px; margin-top: 15px; border-left: 5px solid var(--gold); position: relative; }
        .lunar-tag { color: var(--gold); font-weight: bold; font-size: 13px; }
        .btn-push { background: #007AFF; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="avatar"><img src="https://api.clippid.com/storage/v1/object/public/images/96a603c4-e867-4581-9b16-65103a89370b/1714902120000.jpg" width="100%"></div>
        <b style="font-size: 20px;">ĐỨC TÚ EVENT</b>
    </div>

    <div class="card">
        <h3>📅 Lên Lịch Làm Việc</h3>
        <label>Chọn ngày:</label>
        <input type="date" id="eventDate" onchange="askWhoseEvent()">
        
        <div id="noteArea" style="display:none;">
            <label id="askText"></label>
            <textarea id="eventNote" rows="3" placeholder="Ghi chú chi tiết công việc (VD: Đám cưới nhà trai, xe hoa...)"></textarea>
            <button class="btn-save" onclick="saveToApp()">LƯU LỊCH & ĐẨY SANG GHI CHÚ</button>
        </div>
    </div>

    <div id="displayArea"></div>

    <script>
        // Thuật toán tính lịch âm đơn giản cho năm 2026 (Có thể cập nhật thêm)
        function getLunarDate(dateStr) {
            const d = new Date(dateStr);
            // Đây là mốc tính tương đối cho năm 2026, sếp có thể dùng API nếu cần chính xác tuyệt đối từng ngày
            const lunarData = {
                "2026-05-10": "24/03",
                "2026-05-11": "25/03",
                "2026-05-12": "26/03",
                "2026-05-30": "14/04"
            };
            return lunarData[dateStr] || "Xem trên lịch hệ thống";
        }

        function askWhoseEvent() {
            const date = document.getElementById('eventDate').value;
            if(date) {
                const formattedDate = date.split('-').reverse().join('/');
                document.getElementById('askText').innerText = `Ngày ${formattedDate}, sếp có lịch của ai thế?`;
                document.getElementById('noteArea').style.display = 'block';
            }
        }

        function saveToApp() {
            const date = document.getElementById('eventDate').value;
            const note = document.getElementById('eventNote').value;
            const lunar = getLunarDate(date);

            if(!note) return alert("Sếp nhập ghi chú nhé!");

            // 1. Lưu vào bộ nhớ máy
            const events = JSON.parse(localStorage.getItem('duc_tu_notes')) || [];
            events.push({ date, note, lunar });
            localStorage.setItem('duc_tu_notes', JSON.stringify(events));

            // 2. Tự động đẩy sang Ghi chú (Notes) của iPhone
            // Apple cho phép mở ghi chú mới qua liên kết 'mobilenotes://' 
            // Tuy nhiên để truyền nội dung, sếp dùng cơ chế Share hoặc copy nhanh
            const content = `LỊCH LÀM VIỆC ĐỨC TÚ\nNgày: ${date}\nÂm lịch: ${lunar}\nCông việc: ${note}`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Đức Tú Event Note',
                    text: content
                }).then(() => {
                    alert("Đã đẩy sang Ghi chú/Zalo cho sếp thành công!");
                });
            } else {
                // Phương án dự phòng mở mail/ghi chú
                window.location.href = `mailto:?subject=Lich Lam Viec Duc Tu&body=${encodeURIComponent(content)}`;
            }
            
            render();
        }

        function render() {
            const area = document.getElementById('displayArea');
            const events = JSON.parse(localStorage.getItem('duc_tu_notes')) || [];
            area.innerHTML = events.map(e => `
                <div class="item">
                    <span class="lunar-tag">🌙 Lịch Âm: ${e.lunar}</span><br>
                    <b>📅 ${e.date}</b>
                    <p style="margin: 5px 0;">📝 ${e.note}</p>
                </div>
            `).join('');
        }

        window.onload = render;
    </script>
</body>
</html>
