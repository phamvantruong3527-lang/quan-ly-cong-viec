<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Work Tracker Pro Max</title>
    <style>
        :root {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93;
            --primary: #007AFF; --success: #34C759; --danger: #FF3B30; --accent: #FF9500;
        }
        body.dark-mode { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 15px 40px 15px; transition: 0.3s; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; margin-bottom: 10px; }
        #avatarContainer { width: 45px; height: 45px; border-radius: 14px; overflow: hidden; border: 2px solid var(--accent); background: #fff; }
        #avatarImg { width: 100%; height: 100%; object-fit: cover; }
        
        .card { background: var(--card); padding: 12px; border-radius: 22px; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        /* Cài đặt âm thanh */
        .audio-setting { font-size: 11px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; color: var(--sub); }

        .input-row { display: flex; gap: 6px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; border-radius: 12px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
        .date-input { width: 110px; flex-shrink: 0; font-size: 11px; }
        .add-btn { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 12px 15px; font-weight: 700; font-size: 13px; }

        .task-item { background: var(--card); padding: 12px 15px; border-radius: 20px; margin-bottom: 8px; border-left: 5px solid var(--accent); }
        .task-item.reminded { animation: pulse 1s infinite; border-left-color: var(--danger); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-action { padding: 8px 10px; font-size: 11px; border-radius: 10px; border: none; font-weight: 700; background: var(--bg); color: var(--text); margin-left: 4px; }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="avatarContainer" onclick="document.getElementById('fileInput').click()">
                <img id="avatarImg" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadImg(event)">
            </div>
            <div>
                <b id="userName" onclick="editName()" style="font-size: 16px;">Sếp Tổng</b><br>
                <div class="audio-setting">
                    <span onclick="document.getElementById('audioFile').click()" style="cursor:pointer; color:var(--primary)">🎵 Chọn nhạc chuông</span>
                    <input type="file" id="audioFile" accept="audio/*" style="display:none" onchange="loadAudio(event)">
                </div>
            </div>
        </div>
        <button onclick="toggleDark()" style="background:none; border:none; font-size:20px;">🌓</button>
    </div>

    <div class="card">
        <div class="input-row">
            <input type="text" id="taskName" placeholder="Việc cần nhắc...">
            <input type="datetime-local" id="taskDate" class="date-input">
            <button class="add-btn" onclick="addTask()">HẸN GIỜ</button>
        </div>
    </div>

    <div id="taskList"></div>

    <!-- Audio Player ẩn -->
    <audio id="alarmAudio" loop></audio>

    <script>
        let tasks = JSON.parse(localStorage.getItem('v10_tasks')) || [];
        let cfg = JSON.parse(localStorage.getItem('v10_cfg')) || { name: "Sếp Tổng", avatar: "", dark: false, ringtone: "" };

        // 1. Quản lý Âm thanh
        function loadAudio(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                cfg.ringtone = ev.target.result;
                document.getElementById('alarmAudio').src = ev.target.result;
                localStorage.setItem('v10_cfg', JSON.stringify(cfg));
                alert("Đã lưu nhạc chuông mới!");
            };
            reader.readAsDataURL(file);
        }

        // 2. Bộ canh giờ ngầm (Alarm Engine)
        setInterval(() => {
            const now = new Date();
            const currentTime = now.getFullYear() + "-" + 
                                String(now.getMonth()+1).padStart(2,'0') + "-" + 
                                String(now.getDate()).padStart(2,'0') + "T" + 
                                String(now.getHours()).padStart(2,'0') + ":" + 
                                String(now.getMinutes()).padStart(2,'0');

            tasks.forEach(t => {
                if (t.d === currentTime && t.s === 'p' && !t.reminded) {
                    triggerAlarm(t);
                }
            });
        }, 10000); // Quét mỗi 10 giây cho chính xác

        function triggerAlarm(task) {
            task.reminded = true;
            // Phát nhạc
            const audio = document.getElementById('alarmAudio');
            if (cfg.ringtone) audio.src = cfg.ringtone;
            audio.play().catch(() => console.log("Cần sếp tương tác để phát nhạc"));
            
            // Hiện thông báo
            if (Notification.permission === 'granted') {
                new Notification("BÁO THỨC!", { body: task.n, tag: 'alarm' });
            }
            render();
            alert("⏰ ĐẾN GIỜ: " + task.n);
            audio.pause(); // Tắt nhạc khi sếp bấm OK
        }

        // 3. Logic App
        function getLunar(str) {
            const d = new Date(str);
            const diff = Math.floor((d - new Date(2026, 4, 18)) / 86400000);
            let ld = 2 + diff, lm = 4;
            while(ld > 29) { ld -= 29; lm++; } while(ld < 1) { ld += 29; lm--; }
            return `${ld < 10 ? '0'+ld : ld}/${lm < 10 ? '0'+lm : lm} (Âm)`;
        }

        function addTask() {
            const n = document.getElementById('taskName').value, d = document.getElementById('taskDate').value;
            if(!n || !d) return;
            tasks.push({ id: Date.now(), n, d, l: getLunar(d), s: 'p', reminded: false });
            save();
            document.getElementById('taskName').value = '';
            if (Notification.permission !== 'granted') Notification.requestPermission();
        }

        function save() { localStorage.setItem('v10_tasks', JSON.stringify(tasks)); render(); }

        function render() {
            const list = document.getElementById('taskList');
            tasks.sort((a,b) => new Date(a.d) - new Date(b.d));
            list.innerHTML = tasks.map(t => `
                <div class="task-item ${t.reminded ? 'reminded' : ''}">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div>
                            <b style="font-size:14px;">${t.n}</b><br>
                            <span style="color:var(--accent); font-size:11px; font-weight:800;">🌙 ${t.l}</span>
                            <small style="color:var(--sub); font-size:10px; margin-left:5px;">${t.d.replace('T',' ')}</small>
                        </div>
                        <div>
                            <button class="btn-action" onclick="del(${t.id})">Xóa</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function del(id) { tasks = tasks.filter(x => x.id !== id); save(); }
        function toggleDark() { cfg.dark = !cfg.dark; applyTheme(); localStorage.setItem('v10_cfg', JSON.stringify(cfg)); }
        function applyTheme() { document.getElementById('mainBody').className = cfg.dark ? 'dark-mode' : ''; }
        function editName() { const n = prompt("Tên sếp:", cfg.name); if(n) { cfg.name = n; document.getElementById('userName').innerText = n; localStorage.setItem('v10_cfg', JSON.stringify(cfg)); } }
        function uploadImg(e) {
            const r = new FileReader();
            r.onload = () => { cfg.avatar = r.result; document.getElementById('avatarImg').src = r.result; localStorage.setItem('v10_cfg', JSON.stringify(cfg)); };
            r.readAsDataURL(e.target.files[0]);
        }

        window.onload = () => {
            document.getElementById('userName').innerText = cfg.name;
            if(cfg.avatar) document.getElementById('avatarImg').src = cfg.avatar;
            if(cfg.ringtone) document.getElementById('alarmAudio').src = cfg.ringtone;
            applyTheme(); render();
        };
    </script>
</body>
</html>
