<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Đức Tú Pro</title>
    <style>
        :root { --primary: #D4AF37; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 20px; text-align: center; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); margin: 0 auto 10px; overflow: hidden; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; }
        #status { font-size: 12px; color: #34C759; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="avatar">
        <img src="https://api.clippid.com/storage/v1/object/public/images/96a603c4-e867-4581-9b16-65103a89370b/1714902120000.jpg" width="100%">
    </div>
    <h2 style="color:var(--primary); margin-bottom: 5px;">ĐỨC TÚ EVENT</h2>
    <div id="status">● Hệ thống chạy ngầm đã kích hoạt</div>

    <div class="card">
        <button class="btn" style="background:#007AFF; margin-bottom:15px;" onclick="enableNotif()">1. BẬT THÔNG BÁO HỆ THỐNG</button>
        <input type="text" id="taskName" placeholder="Tên việc cần báo...">
        <input type="datetime-local" id="taskDate">
        <button class="btn" onclick="saveTask()">2. LƯU LỊCH CHẠY NGẦM</button>
    </div>

    <script>
        let swReg = null;

        // Đăng ký Service Worker khi mở app
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                swReg = reg;
                document.getElementById('status').style.display = 'block';
            });
        }

        async function enableNotif() {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                alert("Sếp đã cấp quyền! Thông báo sẽ nổ kể cả khi tắt app.");
            } else {
                alert("Sếp cần vào Cài đặt iPhone để cho phép thông báo Safari.");
            }
        }

        function saveTask() {
            const name = document.getElementById('taskName').value;
            const dateValue = document.getElementById('taskDate').value;
            
            if (!name || !dateValue) return alert("Sếp điền đủ thông tin nhé!");

            const triggerTime = new Date(dateValue).getTime();
            const now = Date.now();

            if (triggerTime <= now) return alert("Sếp chọn giờ ở tương lai nhé!");

            // Gửi thông tin sang Service Worker để nó canh giờ
            if (swReg && swReg.active) {
                swReg.active.postMessage({
                    type: 'SET_ALARM',
                    taskName: name,
                    triggerTime: triggerTime
                });
                alert("Đã cài báo thức ngầm cho việc: " + name);
            } else {
                alert("Hệ thống chưa sẵn sàng, sếp đợi 1 giây rồi bấm lại nhé!");
            }
        }
    </script>
</body>
</html>
