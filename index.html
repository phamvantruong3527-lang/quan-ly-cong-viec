<html lang="vi">
<head>
    <meta charset="UTF-8">

    <!-- ICON APP (ĐÃ NHÚNG TRỰC TIẾP MÃ ẢNH ĐỨC TÚ) -->

    <title>Đức Tú Event</title>
    <style>
        :root {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93;
            --primary: #D4AF37; --success: #34C759; --danger: #FF3B30; --accent: #D4AF37;
        }
        body.dark-mode { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 40px 15px; transition: 0.3s; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
        #avatarContainer { width: 55px; height: 55px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); background: #fff; box-shadow: 0 4px 10px rgba(212,175,55,0.4); }
        #avatarImg { width: 100%; height: 100%; object-fit: cover; }
        
        .card { background: var(--card); padding: 15px; border-radius: 22px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(212,175,55,0.2); }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; border-radius: 12px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
        .add-btn { background: linear-gradient(135deg, #D4AF37, #B8860B); color: white; border: none; border-radius: 12px; padding: 12px 18px; font-weight: 700; }
        .task-item { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 10px; border-left: 5px solid var(--accent); }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="avatarContainer">
                <!-- Dùng thẳng link ảnh sếp gửi cho Avatar -->
                <img id="avatarImg" src="https://api.clippid.com/storage/v1/object/public/images/96a603c4-e867-4581-9b16-65103a89370b/1714902120000.jpg" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
            </div>
            <div>
                <b style="font-size: 18px; color: #B8860B;">ĐỨC TÚ EVENT</b><br>
                <small id="statusText" style="color:var(--sub); font-size:11px">Hệ thống sẵn sàng</small>
            </div>
        </div>
        <button onclick="toggleDark()" style="background:none; border:none; font-size:22px;">🌓</button>
    </div>

    <div class="card">
        <div class="input-row">
            <input type="text" id="taskName" placeholder="Ghi chú việc...">
            <input type="datetime-local" id="taskDate" style="width:110px; font-size:11px;">
            <button class="add-btn" onclick="addTask()">LƯU</button>
        </div>
    </div>

    <div id="taskList"></div>
    <audio id="alarmAudio" loop></audio>

    <script>
        // Tối giản hóa để chạy mượt nhất
        let tasks = JSON.parse(localStorage.getItem('v13_tasks')) || [];
        let isDark = localStorage.getItem('v13_dark') === 'true';

        function addTask() {
            const n = document.getElementById('taskName').value, d = document.getElementById('taskDate').value;
            if(!n || !d) return;
            tasks.push({ id: Date.now(), n, d, reminded: false });
            localStorage.setItem('v13_tasks', JSON.stringify(tasks));
            render();
            document.getElementById('taskName').value = '';
            alert("Đã lưu lịch sếp nhé!");
        }

        function render() {
            const list = document.getElementById('taskList');
            tasks.sort((a,b) => new Date(a.d) - new Date(b.d));
            list.innerHTML = tasks.map(t => `
                <div class="task-item">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <div>
                            <b style="font-size:14px; color:#B8860B;">${t.n}</b><br>
                            <small style="color:var(--sub);">${t.d.replace('T',' ')}</small>
                        </div>
                        <button onclick="del(${t.id})" style="border:none; background:none; color:red; font-weight:bold;">X</button>
                    </div>
                </div>
            `).join('');
        }

        function del(id) { if(confirm('Xóa việc này?')) { tasks = tasks.filter(x => x.id !== id); localStorage.setItem('v13_tasks', JSON.stringify(tasks)); render(); } }
        
        function toggleDark() { 
            isDark = !isDark; 
            document.getElementById('mainBody').className = isDark ? 'dark-mode' : '';
            localStorage.setItem('v13_dark', isDark);
        }

        window.onload = () => {
            if(isDark) document.getElementById('mainBody').className = 'dark-mode';
            render();
        };
    </script>
</body>

    <title>Đức Tú - Work Tracker</title>
    <style>
        :root {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93;
            --primary: #D4AF37; --success: #34C759; --danger: #FF3B30; --accent: #D4AF37;
        }
        body.dark-mode { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 40px 15px; transition: 0.3s; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
        #avatarContainer { width: 50px; height: 50px; border-radius: 12px; overflow: hidden; border: 2px solid var(--accent); background: #fff; box-shadow: 0 4px 10px rgba(212,175,55,0.3); }
        #avatarImg { width: 100%; height: 100%; object-fit: cover; }
        
        .audio-setting { font-size: 11px; margin-top: 4px; color: var(--primary); cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .card { background: var(--card); padding: 15px; border-radius: 22px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(212,175,55,0.1); }

        .input-row { display: flex; gap: 8px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; border-radius: 12px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; border: 1px solid transparent; }
        input:focus { border-color: var(--accent); }
        .date-input { width: 115px; flex-shrink: 0; font-size: 11px; }
        .add-btn { background: linear-gradient(135deg, #D4AF37, #B8860B); color: white; border: none; border-radius: 12px; padding: 12px 18px; font-weight: 700; box-shadow: 0 4px 10px rgba(184,134,11,0.3); }

        .task-item { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 10px; border-left: 5px solid var(--accent); }
        .task-main { display: flex; justify-content: space-between; align-items: center; }
        
        .edit-zone { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #ccc; display: none; gap: 8px; flex-direction: column; }
        .btn-action { padding: 8px 12px; font-size: 11px; border-radius: 10px; border: none; font-weight: 700; background: var(--bg); color: var(--text); }
        
        @keyframes alert-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        .reminded { animation: alert-shake 0.5s infinite; border-left-color: var(--danger) !important; background: #fff5f5; }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="avatarContainer" onclick="document.getElementById('fileInput').click()">
                <!-- Avatar mặc định dùng luôn ảnh logo sếp gửi -->
                <img id="avatarImg" src="https://api.clippid.com/storage/v1/object/public/images/96a603c4-e867-4581-9b16-65103a89370b/1714902120000.jpg">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadImg(event)">
            </div>
            <div>
                <b id="userName" onclick="editName()" style="font-size: 18px; color: #B8860B;">ĐỨC TÚ EVENT</b><br>
                <div class="audio-setting" onclick="document.getElementById('audioFile').click()">🎵 Cài nhạc chuông</div>
                <input type="file" id="audioFile" accept="audio/*" style="display:none" onchange="loadAudio(event)">
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="testNotif()" style="background:none; border:none; font-size:22px;">🔔</button>
            <button onclick="toggleDark()" style="background:none; border:none; font-size:22px;">🌓</button>
        </div>
    </div>

    <div class="card">
        <div class="input-row">
            <input type="text" id="taskName" placeholder="Tên sự kiện / Việc làm...">
            <input type="datetime-local" id="taskDate" class="date-input">
            <button class="add-btn" onclick="addTask()">LƯU</button>
        </div>
    </div>

    <div id="taskList"></div>

    <audio id="alarmAudio" loop></audio>

    <script>
        // --- THÔNG BÁO ---
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        function sendPush(title, body) {
            if (Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.active.postMessage({ type: 'SHOW_NOTIFICATION', title, body });
                });
            }
        }
        function testNotif() {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') sendPush("Đức Tú Event", "Hệ thống thông báo đã sẵn sàng! 🏆");
            });
        }

        // --- DỮ LIỆU ---
        let tasks = JSON.parse(localStorage.getItem('v12_tasks')) || [];
        let cfg = JSON.parse(localStorage.getItem('v12_cfg')) || { name: "ĐỨC TÚ EVENT", avatar: "", dark: false, ringtone: "" };

        function loadAudio(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                cfg.ringtone = ev.target.result;
                document.getElementById('alarmAudio').src = ev.target.result;
                localStorage.setItem('v12_cfg', JSON.stringify(cfg));
                sendPush("Hệ thống", "Đã cập nhật nhạc chuông mới ✅");
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        setInterval(() => {
            const now = new Date();
            const nowStr = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,'0') + "-" + String(now.getDate()).padStart(2,'0') + "T" + String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0');
            tasks.forEach(t => {
                if (t.d === nowStr && !t.reminded) {
                    t.reminded = true;
                    const audio = document.getElementById('alarmAudio');
                    if(cfg.ringtone) audio.src = cfg.ringtone;
                    audio.play();
                    sendPush("⏰ ĐẾN GIỜ!", t.n);
                    render();
                    setTimeout(() => { if(confirm("⏰ SỰ KIỆN: " + t.n)) { audio.pause(); audio.currentTime = 0; } }, 500);
                }
            });
        }, 15000);

        function getLunar(str) {
            const d = new Date(str);
            const diff = Math.floor((d - new Date(2026, 4, 18)) / 86400000);
            let ld = 2 + diff, lm = 4;
            while(ld > 29) { ld -= 29; lm++; } while(ld < 1) { ld += 29; lm--; }
            return `${ld < 10 ? '0'+ld : ld}/${lm < 10 ? '0'+lm : lm} (Âm)`;
        }

        function addTask() {
            const n = document.getElementById('taskName').value, d = document.getElementById('taskDate').value;
            if(!n || !d) return;
            tasks.push({ id: Date.now(), n, d, l: getLunar(d), reminded: false });
            save();
            sendPush("Đã ghi lịch", n);
            document.getElementById('taskName').value = '';
        }

        function updateTask(id) {
            const newDate = document.getElementById(`newDate-${id}`).value;
            tasks = tasks.map(t => t.id === id ? {...t, d: newDate, l: getLunar(newDate), reminded: false} : t);
            save();
            sendPush("Cập nhật", "Đã đổi giờ nhắc việc thành công!");
        }

        function save() { localStorage.setItem('v12_tasks', JSON.stringify(tasks)); render(); }

        function render() {
            const list = document.getElementById('taskList');
            tasks.sort((a,b) => new Date(a.d) - new Date(b.d));
            list.innerHTML = tasks.map(t => `
                <div class="task-item ${t.reminded ? 'reminded' : ''}">
                    <div class="task-main">
                        <div>
                            <b style="font-size:14px; color: #B8860B;">${t.n}</b><br>
                            <span style="color:var(--accent); font-size:11px; font-weight:800;">🌙 ${t.l}</span>
                            <small style="color:var(--sub); font-size:10px; margin-left:5px;">${t.d.replace('T',' ')}</small>
                        </div>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-action" onclick="document.getElementById('edit-${t.id}').style.display='flex'">⚙️</button>
                            <button class="btn-action" style="color:var(--danger)" onclick="del(${t.id})">X</button>
                        </div>
                    </div>
                    <div class="edit-zone" id="edit-${t.id}">
                        <div style="display:flex; gap:5px;">
                            <input type="datetime-local" id="newDate-${t.id}" value="${t.d}">
                            <button class="add-btn" style="padding:8px" onclick="updateTask(${t.id})">OK</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function del(id) { if(confirm('Xóa?')) { tasks = tasks.filter(x => x.id !== id); save(); } }
        function toggleDark() { cfg.dark = !cfg.dark; applyTheme(); localStorage.setItem('v12_cfg', JSON.stringify(cfg)); }
        function applyTheme() { document.getElementById('mainBody').className = cfg.dark ? 'dark-mode' : ''; }
        function editName() { const n = prompt("Tên sếp:", cfg.name); if(n) { cfg.name = n; document.getElementById('userName').innerText = n; localStorage.setItem('v12_cfg', JSON.stringify(cfg)); } }
        function uploadImg(e) {
            const r = new FileReader();
            r.onload = () => { cfg.avatar = r.result; document.getElementById('avatarImg').src = r.result; localStorage.setItem('v12_cfg', JSON.stringify(cfg)); };
            r.readAsDataURL(e.target.files[0]);
        }

        window.onload = () => {
            document.getElementById('userName').innerText = cfg.name;
            if(cfg.avatar) document.getElementById('avatarImg').src = cfg.avatar;
            if(cfg.ringtone) document.getElementById('alarmAudio').src = cfg.ringtone;
            applyTheme(); render();
        };
    </script>
</body>
</html>
