<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Đức Tú Event">

    <!-- ICON APP (MÃ HÓA TRỰC TIẾP - KHÔNG CẦN LINK) -->
    <link rel="apple-touch-icon" href="https://api.clippid.com/storage/v1/object/public/images/96a603c4-e867-4581-9b16-65103a89370b/1714902120000.jpg">

    <title>Đức Tú Event</title>
    <style>
        :root {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93;
            --primary: #D4AF37; --accent: #D4AF37;
        }
        body.dark-mode { --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 40px 15px; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
        .avatar-box { width: 55px; height: 55px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); background: #fff; box-shadow: 0 4px 10px rgba(212,175,55,0.4); }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .card { background: var(--card); padding: 15px; border-radius: 22px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(212,175,55,0.2); }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; border-radius: 12px; background: var(--bg); color: var(--text); font-size: 14px; outline: none; }
        .add-btn { background: linear-gradient(135deg, #D4AF37, #B8860B); color: white; border: none; border-radius: 12px; padding: 12px 18px; font-weight: 700; }
        
        .task-item { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 10px; border-left: 5px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .btn-edit { background: none; border: none; color: var(--accent); font-size: 18px; margin-right: 10px; }
        
        .edit-panel { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ccc; flex-direction: column; gap: 8px; width: 100%; }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="avatar-box">
                <img src="https://api.clippid.com/storage/v1/object/public/images/96a603c4-e867-4581-9b16-65103a89370b/1714902120000.jpg" alt="Đức Tú Logo">
            </div>
            <div>
                <b style="font-size: 18px; color: #B8860B;">ĐỨC TÚ EVENT</b><br>
                <small style="color:var(--sub); font-size:11px">Quản lý lịch sự kiện</small>
            </div>
        </div>
        <button onclick="toggleDark()" style="background:none; border:none; font-size:22px;">🌓</button>
    </div>

    <div class="card">
        <div class="input-row">
            <input type="text" id="taskName" placeholder="Tên sự kiện...">
            <input type="datetime-local" id="taskDate" style="width:110px; font-size:11px;">
            <button class="add-btn" onclick="addTask()">LƯU</button>
        </div>
    </div>

    <div id="taskList"></div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('vULTRA_tasks')) || [];
        let isDark = localStorage.getItem('vULTRA_dark') === 'true';

        function addTask() {
            const n = document.getElementById('taskName').value, d = document.getElementById('taskDate').value;
            if(!n || !d) return;
            tasks.push({ id: Date.now(), n, d });
            save();
            document.getElementById('taskName').value = '';
        }

        function save() {
            localStorage.setItem('vULTRA_tasks', JSON.stringify(tasks));
            render();
        }

        function render() {
            const list = document.getElementById('taskList');
            tasks.sort((a,b) => new Date(a.d) - new Date(b.d));
            list.innerHTML = tasks.map(t => `
                <div class="task-item" style="flex-wrap: wrap;">
                    <div style="flex: 1;">
                        <b style="color:#B8860B;">${t.n}</b><br>
                        <small style="color:var(--sub);">${new Date(t.d).toLocaleString('vi-VN')}</small>
                    </div>
                    <div>
                        <button class="btn-edit" onclick="toggleEdit(${t.id})">⚙️</button>
                        <button onclick="del(${t.id})" style="border:none; background:none; color:red; font-size:20px;">×</button>
                    </div>
                    <div class="edit-panel" id="edit-${t.id}">
                        <input type="datetime-local" id="newDate-${t.id}" value="${t.d}" style="background:var(--bg);">
                        <button class="add-btn" style="padding:8px;" onclick="updateDate(${t.id})">XÁC NHẬN ĐỔI</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleEdit(id) {
            const el = document.getElementById(`edit-${id}`);
            el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
        }

        function updateDate(id) {
            const newD = document.getElementById(`newDate-${id}`).value;
            tasks = tasks.map(t => t.id === id ? {...t, d: newD} : t);
            save();
        }

        function del(id) { if(confirm('Xóa?')) { tasks = tasks.filter(x => x.id !== id); save(); } }
        
        function toggleDark() { 
            isDark = !isDark; 
            document.body.classList.toggle('dark-mode', isDark);
            localStorage.setItem('vULTRA_dark', isDark);
        }

        window.onload = () => {
            if(isDark) document.body.classList.add('dark-mode');
            render();
        };
    </script>
</body>
</html>
