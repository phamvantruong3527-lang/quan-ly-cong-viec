<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Work Tracker Pro</title>
    <!-- Thư viện lịch âm chính xác -->
    <script src="https://unpkg.com/lunar-typescript@1.7.5/dist/lunar.js"></script>
    <style>
        :root {
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93;
            --primary: #007AFF; --success: #34C759; --danger: #FF3B30; --accent: #FF9500;
        }
        body.dark-mode {
            --bg: #000000; --card: #1C1C1E; --text: #FFFFFF; --sub: #8E8E93;
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 80px 15px; transition: 0.3s; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 5px; margin-bottom: 20px; }
        .profile-group { display: flex; align-items: center; gap: 15px; }
        
        /* Avatar bo tròn tinh tế */
        #avatarContainer { position: relative; width: 55px; height: 55px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); background: #eee; }
        #avatarImg { width: 100%; height: 100%; object-fit: cover; }
        #fileInput { display: none; }

        .card { background: var(--card); padding: 22px; border-radius: 28px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: none; }
        .total-box { background: var(--text); color: var(--bg); text-align: center; }
        .total-amount { font-size: 36px; font-weight: 800; display: block; color: var(--accent); }

        .input-label { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 10px; display: block; padding-left: 5px; }
        
        input, select { 
            width: 100%; padding: 16px; border: none; border-radius: 20px; 
            background: var(--bg); color: var(--text); font-size: 16px; box-sizing: border-box;
            outline: none; transition: 0.2s;
        }
        
        .lunar-preview { 
            background: linear-gradient(135deg, rgba(255,149,0,0.1), rgba(255,149,0,0.05)); 
            padding: 18px; border-radius: 22px; text-align: center; margin: 15px 0;
        }
        .lunar-text { font-size: 20px; font-weight: 800; color: var(--accent); display: block; }
        
        button { 
            width: 100%; padding: 18px; background: var(--primary); color: white; 
            border: none; border-radius: 22px; font-weight: 700; font-size: 16px; 
            box-shadow: 0 8px 20px rgba(0,122,255,0.2); transition: 0.2s;
        }
        button:active { transform: scale(0.96); }

        .task-item { background: var(--card); padding: 20px; border-radius: 26px; margin-bottom: 12px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .task-lunar { font-size: 18px; font-weight: 800; color: var(--accent); margin-bottom: 5px; display: block; }
        .task-solar { font-size: 13px; color: var(--sub); font-weight: 500; }
        
        .theme-toggle { background: var(--card); border: none; width: 45px; height: 45px; border-radius: 15px; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .action-flex { display: flex; gap: 12px; margin-top: 15px; }
        .btn-s { flex: 1; padding: 12px; font-size: 14px; border-radius: 15px; }
    </style>
</head>
<body id="mainBody">

    <div class="header">
        <div class="profile-group">
            <div id="avatarContainer" onclick="document.getElementById('fileInput').click()">
                <img id="avatarImg" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
                <input type="file" id="fileInput" accept="image/*" onchange="uploadAvatar(event)">
            </div>
            <div>
                <b id="userName" onclick="editName()" style="font-size: 20px; letter-spacing: -0.5px;">Sếp Tổng</b><br>
                <small id="dateNow" style="color: var(--sub); font-weight: 600;"></small>
            </div>
        </div>
        <button class="theme-toggle" onclick="toggleDarkMode()">🌓</button>
    </div>

    <div class="card total-box">
        <small style="letter-spacing: 1px; font-weight: 700; opacity: 0.7;">THU NHẬP TUẦN NÀY</small>
        <span class="total-amount" id="totalDisplay">0</span>
        <small style="font-weight: 600;">VNĐ</small>
    </div>

    <div class="card">
        <span class="input-label">Tên công việc</span>
        <input type="text" id="taskName" placeholder="Ví dụ: Xe hoa nhà trai">
        
        <span class="input-label" style="margin-top: 15px;">Ngày dương lịch</span>
        <input type="datetime-local" id="taskDate" onchange="updateLunar()">
        
        <div id="lunarBox" class="lunar-preview" style="display:none">
            <small style="color:var(--accent); font-weight: 700; font-size: 11px; letter-spacing: 1px;">LỊCH ÂM CHÍNH XÁC</small>
            <span id="lunarVal" class="lunar-text"></span>
        </div>

        <button onclick="addTask()" style="margin-top: 20px;">+ LƯU LỊCH LÀM VIỆC</button>
    </div>

    <div id="taskList"></div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('jobPro_V3')) || [];
        let config = JSON.parse(localStorage.getItem('configPro_V3')) || { name: "Sếp Tổng", avatar: "", darkMode: false };

        // 1. TÍNH LỊCH ÂM CHÍNH XÁC
        function getLunar(dateStr) {
            const d = new Date(dateStr);
            const solar = Lunar.Solar.fromYmd(d.getFullYear(), d.getMonth() + 1, d.getDate());
            const lunar = solar.getLunar();
            return `Ngày ${lunar.getDay()} tháng ${lunar.getMonth()} âm lịch`;
        }

        function updateLunar() {
            const val = document.getElementById('taskDate').value;
            if(val) {
                document.getElementById('lunarBox').style.display = 'block';
                document.getElementById('lunarVal').innerText = getLunar(val);
            }
        }

        // 2. UP ẢNH TỪ THƯ VIỆN
        function uploadAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() {
                config.avatar = reader.result;
                document.getElementById('avatarImg').src = reader.result;
                localStorage.setItem('configPro_V3', JSON.stringify(config));
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function editName() {
            const n = prompt("Tên của sếp:", config.name);
            if(n) {
                config.name = n;
                document.getElementById('userName').innerText = n;
                localStorage.setItem('configPro_V3', JSON.stringify(config));
            }
        }

        function toggleDarkMode() {
            config.darkMode = !config.darkMode;
            applyTheme();
            localStorage.setItem('configPro_V3', JSON.stringify(config));
        }

        function applyTheme() {
            document.getElementById('mainBody').className = config.darkMode ? 'dark-mode' : '';
        }

        function addTask() {
            const name = document.getElementById('taskName').value;
            const date = document.getElementById('taskDate').value;
            if(!name || !date) return alert("Sếp nhập thiếu rồi!");

            tasks.push({
                id: Date.now(),
                name, date,
                lunar: getLunar(date),
                pay: 0, status: 'pending', doneAt: null
            });
            save();
            document.getElementById('taskName').value = '';
            document.getElementById('lunarBox').style.display = 'none';
        }

        function completeTask(id) {
            const t = tasks.find(x => x.id === id);
            const p = prompt("Tiền công nhận được (VNĐ):", t.pay || "");
            if(p === null) return;
            tasks = tasks.map(x => x.id === id ? {...x, pay: parseFloat(p) || 0, status: 'done', doneAt: new Date().toISOString()} : x);
            save();
        }

        function save() {
            localStorage.setItem('jobPro_V3', JSON.stringify(tasks));
            render();
        }

        function render() {
            const list = document.getElementById('taskList');
            let total = 0;
            const limit = new Date(); limit.setDate(limit.getDate() - 7);

            tasks.sort((a,b) => new Date(a.date) - new Date(b.date));

            list.innerHTML = tasks.map(t => {
                const isDone = t.status === 'done';
                if(isDone && new Date(t.doneAt) >= limit) total += t.pay;

                return `
                    <div class="task-item" style="border-right: ${isDone ? '5px solid var(--success)' : '5px solid var(--accent)'}">
                        <span class="task-lunar">${t.lunar}</span>
                        <div style="font-weight:700; font-size: 17px; margin-bottom: 5px;">${t.name}</div>
                        <div class="task-solar">Dương: ${new Date(t.date).toLocaleString('vi-VN')}</div>
                        ${isDone ? `<div style="margin-top:10px; color:var(--success); font-weight:800; font-size:18px;">+ ${t.pay.toLocaleString()}đ</div>` : ''}
                        
                        <div class="action-flex">
                            <button class="btn-s" onclick="completeTask(${t.id})" style="background:var(--bg); color:var(--text); box-shadow:none;">${isDone ? 'Sửa tiền' : 'Xong'}</button>
                            <button class="btn-s" style="background:rgba(255,59,48,0.1); color:var(--danger); box-shadow:none;" onclick="if(confirm('Xóa?')) { tasks = tasks.filter(x => x.id !== ${t.id}); save(); }">Xóa</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('totalDisplay').innerText = total.toLocaleString('vi-VN');
        }

        window.onload = () => {
            document.getElementById('userName').innerText = config.name;
            if(config.avatar) document.getElementById('avatarImg').src = config.avatar;
            applyTheme();
            render();
            document.getElementById('dateNow').innerText = new Date().toLocaleDateString('vi-VN', {day:'numeric', month:'numeric', year:'numeric'});
        };
    </script>
</body>
</html>
