<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Đức Tú Event - Lịch Diễn</title>
    <style>
        :root { --gold: #D4AF37; --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E; --sub: #8E8E93; }
        body.dark { --bg: #0A0A0A; --card: #1C1C1E; --text: #FFFFFF; --sub: #888; }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px 30px 15px; transition: 0.3s; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(142,142,147,0.2); }
        .avatar-box { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; }
        
        .main-card { background: var(--card); padding: 18px; border-radius: 22px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        /* Ô nhập liệu siêu gọn */
        .input-item { position: relative; margin-bottom: 10px; }
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(142,142,147,0.3); 
            background: var(--bg); 
            color: var(--text); 
            box-sizing: border-box; 
            font-size: 14px;
            outline: none;
        }

        /* Ghi chú nhỏ lồng trong ô lịch */
        .date-input-container { position: relative; }
        .date-label { 
            position: absolute; 
            right: 12px; 
            top: 50%; 
            transform: translateY(-50%); 
            font-size: 10px; 
            color: var(--gold); 
            pointer-events: none;
            background: var(--bg);
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .lunar-preview { background: rgba(212, 175, 55, 0.1); padding: 10px; border-radius: 12px; color: var(--gold); font-weight: bold; font-size: 12px; text-align: center; display: none; margin: 5px 0; }
        .btn-save { background: linear-gradient(135deg, #D4AF37, #B8860B); color: white; border: none; padding: 14px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 15px; margin-top: 5px; }
        
        .show-item { background: var(--card); padding: 15px; border-radius: 18px; margin-top: 12px; border-left: 5px solid var(--gold); position: relative; }
        .actions { margin-top: 10px; display: flex; justify-content: flex-end; border-top: 1px solid rgba(142,142,147,0.1); padding-top: 8px; }
        .btn-del { background: none; color: #FF3B30; border: none; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body id="mainBody" class="dark">

    <div class="header">
        <div class="avatar-box">
            <div class="avatar"><img src="https://api.clippid.com/storage/v1/object/public/images/96a603c4-e867-4581-9b16-65103a89370b/1714902120000.jpg" width="100%"></div>
            <b style="color: var(--gold); font-size: 16px;">ĐỨC TÚ EVENT</b>
        </div>
        <button onclick="toggleTheme()" style="background:none; border:none; font-size:18px;">🌓</button>
    </div>

    <div class="main-card">
        <div class="input-item">
            <input type="text" id="sTitle" placeholder="Tên khách / Show diễn...">
        </div>
        
        <div class="input-item date-input-container">
            <input type="datetime-local" id="sTime" onchange="previewLunar()">
            <div class="date-label">CHỌN NGÀY DIỄN</div>
        </div>

        <div id="lunarShow" class="lunar-preview"></div>
        
        <button class="btn-save" onclick="saveShow()">LƯU LỊCH DIỄN</button>
    </div>

    <div id="showList"></div>

    <script>
        let shows = JSON.parse(localStorage.getItem('duc_tu_v21')) || [];

        function toggleTheme() { document.getElementById('mainBody').classList.toggle('dark'); }

        function getLunar(str) {
            const d = new Date(str);
            const start = new Date(2026, 1, 17); 
            const diff = Math.floor((d - start) / 86400000) + 1; 
            let ld = (diff % 30) + 1, lm = Math.floor(diff / 30) + 1;
            return `${ld < 10 ? '0'+ld : ld}/${lm < 10 ? '0'+lm : lm} (Âm)`;
        }

        function previewLunar() {
            const time = document.getElementById('sTime').value;
            if(time) {
                const preview = document.getElementById('lunarShow');
                preview.style.display = 'block';
                preview.innerText = "🌙 Lịch Âm: " + getLunar(time);
            }
        }

        function saveShow() {
            const title = document.getElementById('sTitle').value, time = document.getElementById('sTime').value;
            if(!title || !time) return alert("Sếp điền đủ thông tin nhé!");
            
            shows.push({ id: Date.now(), title, time, lunar: getLunar(time) });
            localStorage.setItem('duc_tu_v21', JSON.stringify(shows));
            render();
            
            document.getElementById('sTitle').value = '';
            document.getElementById('sTime').value = '';
            document.getElementById('lunarShow').style.display = 'none';
        }

        function del(id) { if(confirm("Xóa lịch này nhé sếp?")) { shows = shows.filter(x => x.id !== id); localStorage.setItem('duc_tu_v21', JSON.stringify(shows)); render(); } }

        function render() {
            const area = document.getElementById('showList');
            shows.sort((a,b) => new Date(a.time) - new Date(b.time));
            area.innerHTML = shows.map(s => `
                <div class="show-item">
                    <b style="font-size:16px; display:block; margin-bottom:8px;">${s.title}</b>
                    <div style="font-size:12px; line-height:1.5; color:var(--sub);">
                        <b>📅 Dương:</b> ${s.time.replace('T', ' - ')} <br>
                        <b>🌙 Âm lịch:</b> ${s.lunar}
                    </div>
                    <div class="actions">
                        <button class="btn-del" onclick="del(${s.id})">XÓA LỊCH</button>
                    </div>
                </div>
            `).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
