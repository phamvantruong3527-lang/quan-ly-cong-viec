<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Show Diễn Pro</title>
    <style>
        :root {
            --primary: #FF3B30;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
            --accent: #007AFF;
            --success: #34C759;
        }

        [data-theme="dark"] {
            --bg: #1C1C1E;
            --card: #2C2C2E;
            --text: #FFFFFF;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            transition: 0.3s;
        }

        /* Header & Clock */
        .header { text-align: center; margin-bottom: 25px; }
        #live-clock { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        
        /* Avatar Section */
        .profile-section { text-align: center; margin-bottom: 20px; }
        .avatar-container {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--accent); margin: 0 auto;
            overflow: hidden; cursor: pointer; background: #ddd;
        }
        #avatar-img { width: 100%; height: 100%; object-fit: cover; }

        /* Form Card */
        .card {
            background: var(--card); padding: 20px;
            border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        input, select, button {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 10px; border: 1px solid #ddd;
            box-sizing: border-box; font-size: 1rem;
        }

        button {
            background: var(--accent); color: white;
            border: none; font-weight: bold; cursor: pointer;
        }

        .theme-toggle { position: fixed; top: 10px; right: 10px; width: auto; padding: 5px 15px; }

        /* Show List */
        .show-item {
            background: var(--card); padding: 15px;
            border-left: 5px solid var(--accent);
            border-radius: 10px; margin-bottom: 10px;
        }
        .status-btn { display: flex; gap: 5px; margin-top: 10px; }
        .btn-done { background: var(--success); flex: 1; }
        .btn-wait { background: #FF9500; flex: 1; }

        .total-box {
            background: var(--accent); color: white;
            padding: 15px; border-radius: 12px; text-align: center;
        }
    </style>
</head>
<body data-theme="light">

    <button class="theme-toggle" onclick="toggleTheme()">🌓 Chế độ</button>

    <div class="header">
        <div class="profile-section">
            <div class="avatar-container" onclick="document.getElementById('avatar-input').click()">
                <img id="avatar-img" src="https://via.placeholder.com/80" alt="Avatar">
            </div>
            <input type="file" id="avatar-input" hidden accept="image/*" onchange="loadAvatar(event)">
        </div>
        <div id="live-date">Thứ ... , Ngày ...</div>
        <div id="live-clock">00:00:00</div>
    </div>

    <div class="card">
        <h3>📅 Thêm Lịch Show</h3>
        <input type="text" id="show-name" placeholder="Tên Show/Địa điểm">
        <input type="date" id="show-date" onchange="updateLunarDisplay()">
        <div id="lunar-info" style="font-size: 0.8em; color: var(--accent);"></div>
        <input type="time" id="show-time">
        <label style="font-size: 0.8em;">🎵 Nhạc chuông:</label>
        <input type="file" id="ringtone-input" accept="audio/*">
        <button onclick="addShow()">Lưu Lịch Diễn</button>
    </div>

    <div class="total-box">
        Tổng thu nhập tháng này: <span id="monthly-total">0</span> VNĐ
    </div>

    <h3>Danh sách Show</h3>
    <div id="show-list"></div>

    <audio id="alarm-sound"></audio>

    <script>
        let shows = JSON.parse(localStorage.getItem('myShows')) || [];

        // 1. Cập nhật ngày giờ
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('vi-VN');
            checkAlarm(now);
        }, 1000);

        // 2. Chế độ sáng tối
        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
        }

        // 3. Xử lý ảnh đại diện
        function loadAvatar(event) {
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('avatar-img').src = reader.result;
                localStorage.setItem('userAvatar', reader.result);
            };
            reader.readAsDataURL(event.target.files[0]);
        }
        if(localStorage.getItem('userAvatar')) document.getElementById('avatar-img').src = localStorage.getItem('userAvatar');

        // 4. Thêm Show
        function addShow() {
            const name = document.getElementById('show-name').value;
            const date = document.getElementById('show-date').value;
            const time = document.getElementById('show-time').value;
            const ringtone = document.getElementById('ringtone-input').files[0];

            if(!name || !date || !time) return alert("Vui lòng nhập đủ thông tin!");

            const newShow = {
                id: Date.now(),
                name, date, time,
                status: 'pending',
                money: 0,
                ringtone: ringtone ? URL.createObjectURL(ringtone) : null
            };

            shows.push(newShow);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('myShows', JSON.stringify(shows));
            renderShows();
            updateTotal();
        }

        function renderShows() {
            const list = document.getElementById('show-list');
            list.innerHTML = '';
            shows.forEach(show => {
                const div = document.createElement('div');
                div.className = 'show-item';
                div.innerHTML = `
                    <strong>${show.name}</strong> <br>
                    📅 ${show.date} | ⏰ ${show.time}
                    <div class="status-btn">
                        ${show.status === 'pending' ? `
                            <button class="btn-done" onclick="completeShow(${show.id})">Hoàn thành</button>
                            <button class="btn-wait" onclick="alert('Đã đánh dấu chờ thanh toán')">Chờ tiền</button>
                        ` : `<span>✅ Đã nhận: ${show.money} VNĐ</span>`}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function completeShow(id) {
            const amount = prompt("Show này bạn nhận được bao nhiêu tiền?");
            if (amount !== null) {
                const show = shows.find(s => s.id === id);
                show.status = 'done';
                show.money = parseInt(amount) || 0;
                saveAndRender();
            }
        }

        function updateTotal() {
            const now = new Date();
            const currentMonth = now.getMonth();
            const total = shows
                .filter(s => new Date(s.date).getMonth() === currentMonth && s.status === 'done')
                .reduce((sum, s) => sum + s.money, 0);
            document.getElementById('monthly-total').innerText = total.toLocaleString();
        }

        // 5. Thông báo & Nhạc chuông
        function checkAlarm(now) {
            const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const currentDate = now.toISOString().split('T')[0];

            shows.forEach(show => {
                if(show.date === currentDate && show.time === currentTime && !show.notified) {
                    show.notified = true;
                    if(show.ringtone) {
                        const audio = document.getElementById('alarm-sound');
                        audio.src = show.ringtone;
                        audio.play();
                    }
                    alert(`⏰ BẮT ĐẦU SHOW: ${show.name}`);
                }
            });
        }

        // 6. Hiển thị lịch âm (Giả lập đơn giản - thực tế cần thư viện đầy đủ)
        function updateLunarDisplay() {
            const date = document.getElementById('show-date').value;
            // Ở đây bạn có thể tích hợp thư viện amlich.js. 
            // Tạm thời hiển thị nhắc nhở:
            document.getElementById('lunar-info').innerText = "Đã chọn ngày dương: " + date + " (Âm lịch tương ứng)";
        }

        renderShows();
        updateTotal();
    </script>
</body>
</html>
