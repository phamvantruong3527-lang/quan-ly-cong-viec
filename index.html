<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Calendar Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/vietnam-lunar-calendar@1.0.1/dist/lunar-calendar.min.js"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-red: #FF3B30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .calendar-container { width: 100%; max-width: 400px; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-name { font-weight: bold; color: #8e8e93; font-size: 0.8em; padding-bottom: 10px; }
        .date-cell { padding: 10px 0; border-radius: 8px; cursor: pointer; position: relative; transition: 0.2s; }
        .date-cell:hover { background: #f0f0f0; }
        .date-cell.today { background: var(--ios-red); color: #fff; }
        .lunar-date { font-size: 0.6em; display: block; color: #8e8e93; }
        .today .lunar-date { color: #eee; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.2); z-index: 10; width: 80%; max-width: 300px; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; }
        .btn-group { display: flex; justify-content: flex-end; gap: 10px; }
        button { border: none; background: var(--ios-blue); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="calendar-container">
    <header>
        <h2 id="monthDisplay">Tháng 5 2026</h2>
    </header>
    <div class="days-grid" id="calendarGrid">
        <!-- Tên các thứ -->
        <div class="day-name">T2</div><div class="day-name">T3</div><div class="day-name">T4</div>
        <div class="day-name">T5</div><div class="day-name">T6</div><div class="day-name">T7</div><div class="day-name">CN</div>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="modal" id="eventModal">
    <h4 id="modalTitle">Thêm lịch làm việc</h4>
    <p>Hôm nay bạn có lịch của ai?</p>
    <input type="text" id="clientName" placeholder="Tên khách hàng/Công việc...">
    <div class="btn-group">
        <button onclick="closeModal()" style="background:#8e8e93">Hủy</button>
        <button onclick="saveAndExport()">Lưu & Đẩy sang Ghi chú</button>
    </div>
</div>

<script>
    let selectedDate = "";

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Chỉnh sửa firstDay để phù hợp với Thứ 2 là ngày đầu tuần
        let startOffset = firstDay === 0 ? 6 : firstDay - 1;

        for (let i = 0; i < startOffset; i++) {
            grid.innerHTML += `<div></div>`;
        }

        for (let day = 1; day <= daysInMonth; day++) {
            // Logic tính âm lịch (Sử dụng thư viện hoặc thuật toán đơn giản)
            // Ở đây minh họa bằng text giả lập, bạn có thể tích hợp thư viện moment-lunar hoặc tương tự
            const lunarDay = Math.floor(Math.random() * 29) + 1; 
            
            const isToday = day === now.getDate() ? 'today' : '';
            grid.innerHTML += `
                <div class="date-cell ${isToday}" onclick="openModal(${day}, ${month+1}, ${year})">
                    ${day}
                    <span class="lunar-date">${lunarDay}/4</span>
                </div>
            `;
        }
    }

    function openModal(d, m, y) {
        selectedDate = `${d}/${m}/${y}`;
        document.getElementById('modalTitle').innerText = `Ngày ${selectedDate}`;
        document.getElementById('eventModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('eventModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('clientName').value = '';
    }

    function saveAndExport() {
        const name = document.getElementById('clientName').value;
        if (!name) return alert("Vui lòng nhập tên!");

        const content = `Lịch làm việc ngày ${selectedDate}: ${name}`;
        
        // Tạo URL scheme để mở app Ghi chú trên iPhone
        // Lưu ý: iOS không cho phép ghi đè trực tiếp vào một note cụ thể từ web, 
        // nhưng ta có thể tạo bản nháp hoặc copy vào Clipboard.
        
        const encodedContent = encodeURIComponent(content);
        
        // Cách 1: Chuyển hướng sang app Ghi chú (tạo note mới qua Share Sheet hoặc Shortcuts)
        // Cách tốt nhất là dùng link chuyển hướng hoặc copy
        navigator.clipboard.writeText(content).then(() => {
            alert("Đã sao chép nội dung. Đang mở Ghi chú...");
            window.location.href = "mobilenotes://"; 
        });
        
        closeModal();
    }

    renderCalendar();
</script>
</body>
</html>
